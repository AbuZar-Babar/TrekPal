services:
  - type: web
    name: trekpal-backend-api
    runtime: node
    rootDir: backend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run render:build
    startCommand: npm run prisma:migrate:deploy && npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_KYC
        value: kyc-private
      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: "3600"
      - key: CORS_ORIGIN
        value: https://trekpal-admin-portal.onrender.com,https://trekpal-agency-portal.onrender.com

  - type: web
    name: trekpal-admin-portal
    runtime: static
    rootDir: admin-portal
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://trekpal-backend-api.onrender.com/api

  - type: web
    name: trekpal-agency-portal
    runtime: static
    rootDir: agency-portal
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://trekpal-backend-api.onrender.com/api
