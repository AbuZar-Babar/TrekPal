<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrekPal | Global Ecosystem Graph</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --accent: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d2d35;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(22, 22, 26, 0.8);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        #header h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #header p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        #details-pane {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(22, 22, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            z-index: 10;
            display: none;
        }

        #details-pane h3 { margin: 0 0 10px; color: var(--accent); }
        #details-pane p { margin: 5px 0; font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="header">
        <h1>Global Ecosystem Graph</h1>
        <p>Cross-project communication & infrastructure bridges</p>
    </div>

    <div id="details-pane" id="node-details">
        <h3 id="detail-title">Node Title</h3>
        <p id="detail-type">Type: Code</p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
        <p id="detail-file">File: path/to/file</p>
    </div>

    <div id="mynetwork"></div>

    <div id="controls">
        <button class="btn" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
        <button class="btn" onclick="network.fit()">Reset View</button>
    </div>

    <script type="text/javascript">
        const nodes = new vis.DataSet([
            { id: 'backend_server', label: 'Backend Server\n(Express)', color: '#6366f1', shape: 'diamond', size: 30 },
            { id: 'prisma_db', label: 'PostgreSQL\n(Prisma)', color: '#10b981', shape: 'database' },
            { id: 'supabase_storage', label: 'Supabase\nStorage', color: '#3b82f6', shape: 'storage' },
            { id: 'traveler_app', label: 'Traveler App\n(Flutter)', color: '#f43f5e', shape: 'dot' },
            { id: 'agency_portal', label: 'Agency Portal\n(React)', color: '#f59e0b', shape: 'dot' },
            { id: 'admin_portal', label: 'Admin Portal\n(React)', color: '#8b5cf6', shape: 'dot' },
            { id: 'socket_server', label: 'Socket.io\nServer', color: '#ec4899', shape: 'hexagon' },
            { id: 'api_gateway', label: 'API Gateway\n(Render)', color: '#94a3b8', shape: 'box' }
        ]);

        const edges = new vis.DataSet([
            { from: 'traveler_app', to: 'api_gateway', label: 'connects', arrows: 'to' },
            { from: 'agency_portal', to: 'api_gateway', label: 'connects', arrows: 'to' },
            { from: 'admin_portal', to: 'api_gateway', label: 'connects', arrows: 'to' },
            { from: 'api_gateway', to: 'backend_server', label: 'routes', arrows: 'to', dashes: true },
            { from: 'backend_server', to: 'prisma_db', label: 'queries', arrows: 'to' },
            { from: 'backend_server', to: 'supabase_storage', label: 'uploads', arrows: 'to' },
            { from: 'backend_server', to: 'socket_server', label: 'initializes', arrows: 'to' },
            { from: 'traveler_app', to: 'socket_server', label: 'listen', arrows: 'both', color: '#ec4899' },
            { from: 'agency_portal', to: 'socket_server', label: 'chat', arrows: 'both', color: '#ec4899' }
        ]);

        const container = document.getElementById('mynetwork');
        const data = { nodes: nodes, edges: edges };
        const options = {
            nodes: {
                font: { color: '#f8fafc', size: 14, face: 'Outfit' },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                font: { color: '#94a3b8', size: 12, align: 'middle' },
                color: { color: '#2d2d35', highlight: '#6366f1' },
                width: 1.5,
                smooth: { type: 'continuous' }
            },
            physics: {
                forceAtlas2Based: {
                    gravitationalConstant: -100,
                    centralGravity: 0.01,
                    springLength: 150,
                    springConstant: 0.08
                },
                maxVelocity: 50,
                solver: 'forceAtlas2Based',
                timestep: 0.35,
                stabilization: { iterations: 150 }
            }
        };

        const network = new vis.Network(container, data, options);

        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const node = nodes.get(nodeId);
                document.getElementById('detail-title').innerText = node.label.replace('\n', ' ');
                document.getElementById('detail-type').innerText = 'Type: ' + (node.shape === 'dot' ? 'Application' : 'Infrastructure');
                document.getElementById('details-pane').style.display = 'block';
            } else {
                document.getElementById('details-pane').style.display = 'none';
            }
        });
    </script>
</body>
</html>
